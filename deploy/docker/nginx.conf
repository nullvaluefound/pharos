server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip is fine for HTML/CSS/JS; nginx defaults are usually sufficient
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets get long-lived cache; HTML stays fresh
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Reverse proxy for the API
    location /api/ {
        proxy_pass __PHAROS_API_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # SPA fallback: every unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
