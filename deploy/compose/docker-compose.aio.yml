# Pharos -- all-in-one compose.
#
# Two long-running containers:
#   pharos    : API + scheduler + lantern + notifier + archiver (supervisord)
#   frontend  : nginx serving the Vite/React SPA + reverse-proxying /api/
#
# Plus a one-shot preflight that refuses to let the stack start if .env
# isn't configured (e.g. OPENAI_API_KEY still the placeholder).
#
# DATA SAFETY:
#   The pharos_data volume is declared `external: true` and pinned to the
#   real on-disk volume name `compose_pharos_data`. This means:
#     * docker compose will never RECREATE the volume (it must already exist)
#     * docker compose down WILL NOT remove it, even with -v
#     * changing the compose project name has no effect on which volume is used
#   Pre-create it once with:
#     docker volume create compose_pharos_data
#   To restore from a backup tarball:
#     docker run --rm -v compose_pharos_data:/data \
#       -v /opt/pharos/backups:/backup alpine:3.20 \
#       sh -c 'tar -xzf /backup/<snapshot>.tgz -C /data'
#
# First-time setup:
#   ./setup-env.sh          (or .\setup-env.ps1)   # writes .env
#   docker volume create compose_pharos_data       # one-time
#   docker compose -f deploy/compose/docker-compose.aio.yml up -d
name: compose
services:
  preflight:
    image: alpine:3.20
    env_file: ../../.env
    # Inline check (no script-file mount; avoids Windows CRLF issues).
    command:
      - /bin/sh
      - -c
      - |
        set -e
        fail=0
        if [ -z "$$OPENAI_API_KEY" ] || [ "$$OPENAI_API_KEY" = "sk-replace-me" ]; then
          echo "ERROR: OPENAI_API_KEY is missing or still the placeholder." >&2
          echo "       Run ./setup-env.sh (or .\\setup-env.ps1) before docker compose up," >&2
          echo "       or edit .env and set OPENAI_API_KEY=sk-..." >&2
          fail=1
        else
          echo "OK: OPENAI_API_KEY is set."
        fi
        if [ -z "$$JWT_SECRET" ] \
           || [ "$$JWT_SECRET" = "please-change-me-to-a-long-random-string" ] \
           || [ "$$JWT_SECRET" = "dev-secret-change-me" ]; then
          echo "ERROR: JWT_SECRET is missing or still the placeholder." >&2
          echo "       Run ./setup-env.sh to auto-generate one." >&2
          fail=1
        else
          echo "OK: JWT_SECRET is set."
        fi
        if [ "$$fail" -ne 0 ]; then
          echo "Pre-flight failed. Stack will not start." >&2
          exit 1
        fi
        echo "Pre-flight passed."
    restart: "no"

  pharos:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.aio
    image: pharos/aio:latest
    env_file: ../../.env
    environment:
      PHAROS_DB_DIR: /data
    volumes:
      - pharos_data:/data
    ports:
      - "8000:8000"
    depends_on:
      preflight:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        # Vite proxies /api -> this URL during dev. nginx in production
        # also re-templates the same value at container start.
        PHAROS_API_URL: http://pharos:8000
    image: pharos/frontend:latest
    environment:
      PHAROS_API_URL: http://pharos:8000
    depends_on:
      pharos:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  # External + named: ties this stack to the existing on-disk volume that has
  # all of the LLM-enriched articles. Will never be recreated by `compose up`,
  # never deleted by `compose down -v`. The volume must already exist; create
  # it once with `docker volume create compose_pharos_data`.
  pharos_data:
    external: true
    name: compose_pharos_data
